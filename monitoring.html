<!DOCTYPE html>
<html>
<head>
    <title>Monitor Attendance</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        .header {
            background: #3498db;
            color: white;
            padding: 15px;
            text-align: center;
        }

        table {
            width: 80%;
            margin: 30px auto;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #2c3e50;
            color: white;
        }

        button {
            padding: 5px 10px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .present {
            background: #2ecc71;
            color: white;
        }

        .absent {
            background: #e74c3c;
            color: white;
        }
    </style>
</head>
<body>

<div class="header">
    <h2>Attendance Monitoring</h2>
</div>

<table>
    <tr>
        <th>Roll No</th>
        <th>Name</th>
        <th>Status</th>
    </tr>

    <tr>
        <td>101</td>
        <td>Rahul</td>
        <td>
            <button class="present">Present</button>
            <button class="absent">Absent</button>
        </td>
    </tr>

    <tr>
        <td>102</td>
        <td>Anjali</td>
        <td>
            <button class="present">Present</button>
            <button class="absent">Absent</button>
        </td>
    </tr>

    <tr>
        <td>103</td>
        <td>Karthik</td>
        <td>
            <button class="present">Present</button>
            <button class="absent">Absent</button>
        </td>
    </tr>
</table>

</body>
</html>
