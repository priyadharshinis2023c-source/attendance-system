<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        .sidebar {
            width: 200px;
            height: 100vh;
            background: #2c3e50;
            position: fixed;
            color: white;
            padding-top: 20px;
        }

        .sidebar a {

            padding: 20px;

            display: inline-block;
            width: 200px;
            text-align: center;
        }

<body>

<div class="sidebar">
    <h3 style="text-align:center;">Menu</h3>
    <a href="dashboard.html">Dashboard</a>
    <a href="monitor.html">Monitor Attendance</a>
    <a href="login.html">Logout</a>
</div>

<div class="content">
    <h2>Dashboard</h2>

    <div class="card">
        <h3>120</h3>
        <p>Total Students</p>
    </div>

    <div class="card">
        <h3>95%</h3>
        <p>Average Attendance</p>
    </div>

    <div class="card">
        <h3>10</h3>
        <p>Classes Today</p>
    </div>
</div>

</html>
